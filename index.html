    { slug: "heal-your-past-to-create-a-better-present", label: "Heal Your Past", score: 9.34, ctr: "3.31%", cr: "1.32%", tag: "Top 27" },
  ], oneOnOne: [], badge: "✅ Inject Content" },
  { position: 10, name: "Spiritual Practices & Devotion", status: "new", score: null, ctr: "—", action: "New rail. Kirtan + Sadhana content has 2,721–1,949 page views, proving a large devotional audience. They need a dedicated home.", courses: [

const statusColors = {
  lock:    { bg: "#052e16", border: "#16a34a", text: "#4ade80" },
  keep:    { bg: "#1e1b4b", border: "#4f46e5", text: "#818cf8" },
  rebuild: { bg: "#1c1400", border: "#d97706", text: "#fbbf24" },
  new:     { bg: "#0f172a", border: "#7c3aed", text: "#a78bfa" },
};

const weekPlan = [
  { week: "Week 1", focus: "Fix Position 4 & Create Tarot Rail", color: "#4ade80",
    tasks: ["Rebuild 'Manifest Wealth' (pos 4) — swap in manifest-like-a-millionaire, magnetise-money, change-money-energy", "Create new 'Personal Sessions — Tarot & Guidance' rail at position 5", "Remove 'Complimentary Sessions B' (CTR 0.39%) entirely"],
    expected: "Pos 4 CTR should jump from 1.53% → ~5%+. New tarot rail expected 8–11% CTR from day 1 based on session-level data." },
  { week: "Week 2", focus: "Karmic Rail Merge + Sleep Rail Launch", color: "#818cf8",
    tasks: ["Merge karmic sessions into one 'Karmic Healing & Relationships' rail at pos 7", "Launch 'Sleep & Stress Relief' rail at pos 8 with breathwork sessions", "If tarot rail CTR > 10% after 7 days, consider promoting it to position 4"],
    expected: "Karmic rail CTR target: 5–6%. Sleep rail may start slow (2–3%) but serves your #1 tag." },
  { week: "Week 3", focus: "Devotion Rail + Expert & Growth Refresh", color: "#fbbf24",
    tasks: ["Launch 'Spiritual Practices & Devotion' rail at pos 10 (Kirtan + Sadhana)", "Inject Hypnotherapy & Heal Your Past into 'Guided Practices for Growth' to push CTR above 3%", "Swap expert lineup in 'Sessions With Top Experts' to Smita + Kajal"],
    expected: "Devotion rail target 4–5% CTR. Growth rail should cross 3% with content injection." },
  { week: "Week 4", focus: "Review, Stabilise & Plan Next Cycle", color: "#f97316",
    tasks: ["Any rail still below 2% CTR after 3 weeks → A/B test the title copy first, then replace if no improvement", "Promote best performer from pos 8–12 up one slot if its score exceeds 15", "Document learnings and build next month's content hypothesis based on CR data"],
    expected: "Overall homepage CTR should be 1.5–2.5pts higher vs your baseline from Week 1." },
];

const insights = [
  { title: "🚨 Biggest Missed Opportunity", color: "#f87171", bg: "#3b0a0a", border: "#dc2626", body: "'manifest-like-a-millionaire' is your #1 course — Score 43.51, CTR 9.24% — but it lives in a rail with only 1.53% CTR. The course is performing despite the rail, not because of it. Fixing this one rail is the highest-ROI move you can make." },
  { title: "🎯 Untapped 1-on-1 CTR", color: "#a78bfa", bg: "#1a0533", border: "#7c3aed", body: "Tarot and guidance 1-on-1 sessions have 10–13% CTR — higher than most rails — yet there is no dedicated 1-on-1 rail on the homepage. This is leaving your highest-intent traffic completely unserved." },
  { title: "📊 Karmic Content Is Fragmented", color: "#fbbf24", bg: "#1c1400", border: "#d97706", body: "Karmic content is scattered across 3 rails. Consolidating karma-cords, karmic-relationships, and karmic-clarity 1-on-1 into one rail will boost signal strength and lift collective CTR." },
  { title: "💤 Top Tag Has No Rail", color: "#60a5fa", bg: "#0c1a2e", border: "#2563eb", body: "'reduce-stress-and-anxiety' is your #1 tag by score (29) but there is no sleep/stress rail. Both breathwork sessions for this theme are currently unhoused. This is a clear gap." },
  { title: "🕉️ Devotional Audience Is Large & Homeless", color: "#4ade80", bg: "#052e16", border: "#16a34a", body: "Immersive Kirtan has 2,721 page views — highest PV after the top course. Hanuman Sadhana has 8.31% CTR. This devotional audience exists and engages, they just have no dedicated rail to land on." },
  { title: "📱 iOS vs Android Gap to Monitor", color: "#f97316", bg: "#1a0a00", border: "#ea580c", body: "Most rails skew Android-heavy in CTR. When building new rails, test different card images per platform — iOS and Android users respond to different visual styles. Split by platform in your weekly data pull." },
];

function RailMap({ expanded, setExpanded }) {
  return e("div", { style: { display: "flex", flexDirection: "column", gap: 10 } },
    e("div", { style: { display: "flex", gap: 10, marginBottom: 8, flexWrap: "wrap" } },
      Object.entries({ lock: "🔒 Locked", keep: "✅ Keep/Inject", rebuild: "🔧 Rebuild/Merge", new: "🆕 New Rail" }).map(([k, v]) => {
        const c = statusColors[k];
        return e("span", { key: k, style: { fontSize: 11, background: c.bg, border: "1px solid " + c.border, color: c.text, borderRadius: 6, padding: "3px 10px" } }, v);
      })
    ),
    railPlan.map((rail, i) => {
      const c = statusColors[rail.status];
      const isOpen = expanded === i;
      const hasSessions = rail.courses.length > 0 || rail.oneOnOne.length > 0;
      return e("div", { key: i, style: { background: "#18181b", border: "1px solid " + (isOpen ? c.border : "#27272a"), borderRadius: 12, overflow: "hidden" } },
        e("div", { onClick: () => setExpanded(isOpen ? null : i), style: { padding: "16px 20px", display: "flex", alignItems: "center", gap: 14, cursor: "pointer" } },
          e("div", { style: { minWidth: 32, height: 32, borderRadius: 8, background: c.bg, border: "1px solid " + c.border, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: c.text } }, rail.position),
          e("div", { style: { flex: 1 } },
            e("div", { style: { fontWeight: 600, color: "#fafafa", fontSize: 14 } }, rail.name),
            e("div", { style: { fontSize: 11, color: "#71717a", marginTop: 2 } }, rail.action.substring(0, 85) + "…")
          ),
          e("div", { style: { display: "flex", gap: 8, alignItems: "center", flexShrink: 0 } },
            rail.score ? e("span", { style: { fontSize: 11, color: "#a1a1aa" } }, "Score " + rail.score) : null,
            rail.ctr !== "—" ? e("span", { style: { fontSize: 11, color: parseFloat(rail.ctr) > 5 ? "#4ade80" : parseFloat(rail.ctr) > 2 ? "#fbbf24" : "#f87171" } }, "CTR " + rail.ctr) : null,
            e("span", { style: { fontSize: 11, fontWeight: 600, background: c.bg, color: c.text, border: "1px solid " + c.border, padding: "2px 8px", borderRadius: 5 } }, rail.badge),
            hasSessions ? e("span", { style: { color: "#52525b", fontSize: 14 } }, isOpen ? "▲" : "▼") : null
          )
        ),
        isOpen ? e("div", { style: { padding: "0 20px 18px", borderTop: "1px solid #27272a" } },
          e("div", { style: { background: "#09090b", borderRadius: 8, padding: "12px 14px", margin: "14px 0", fontSize: 12, color: "#a1a1aa", lineHeight: 1.7 } },
            e("span", { style: { color: c.text, fontWeight: 600 } }, "Action: "),
            rail.action
          ),
          rail.courses.length > 0 ? e("div", { style: { marginBottom: 10 } },
            e("div", { style: { fontSize: 11, color: "#71717a", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 } }, "📚 Courses to Feature"),
            e("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },
              rail.courses.map((c2, j) =>
                e("div", { key: j, style: { background: "#0f172a", border: "1px solid #1e3a5f", borderRadius: 8, padding: "10px 14px", display: "flex", alignItems: "center", gap: 12 } },
                  e("div", { style: { flex: 1 } },
                    e("div", { style: { fontSize: 13, color: "#e4e4e7", fontWeight: 500 } }, c2.label),
                    e("div", { style: { fontSize: 11, color: "#475569", marginTop: 2, fontFamily: "monospace" } }, c2.slug)
                  ),
                  e("div", { style: { display: "flex", gap: 8, flexShrink: 0 } },
                    c2.tag ? e("span", { style: { fontSize: 10, background: "#1e3a5f", color: "#60a5fa", border: "1px solid rgba(37,99,235,0.33)", padding: "2px 7px", borderRadius: 4 } }, c2.tag) : null,
                    e("span", { style: { fontSize: 11, color: "#94a3b8" } }, "CTR " + c2.ctr),
                    e("span", { style: { fontSize: 11, color: "#94a3b8" } }, "CR " + c2.cr),
                    c2.score ? e("span", { style: { fontSize: 11, color: "#60a5fa", fontWeight: 600 } }, "Score " + c2.score) : null
                  )
                )
              )
            )
          ) : null,
          rail.oneOnOne.length > 0 ? e("div", null,
            e("div", { style: { fontSize: 11, color: "#71717a", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 } }, "🧑‍💼 1-on-1 Sessions to Feature"),
            e("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },
              rail.oneOnOne.map((s, j) =>
                e("div", { key: j, style: { background: "#170f1f", border: "1px solid #3b1f5e", borderRadius: 8, padding: "10px 14px", display: "flex", alignItems: "center", gap: 12 } },
                  e("div", { style: { flex: 1 } },
                    e("div", { style: { fontSize: 13, color: "#e4e4e7", fontWeight: 500 } }, s.label),
                    e("div", { style: { fontSize: 11, color: "#475569", marginTop: 2, fontFamily: "monospace" } }, s.slug)
                  ),
                  e("div", { style: { display: "flex", gap: 8, flexShrink: 0 } },
                    s.tag ? e("span", { style: { fontSize: 10, background: "#2e1065", color: "#c084fc", border: "1px solid rgba(124,58,237,0.33)", padding: "2px 7px", borderRadius: 4 } }, s.tag) : null,
                    e("span", { style: { fontSize: 11, color: "#94a3b8" } }, "CTR " + s.ctr),
                    e("span", { style: { fontSize: 11, color: "#94a3b8" } }, "CR " + s.cr)
                  )
                )
              )
            )
          ) : null
        ) : null
      );
    })
  );
}

function WeekPlan() {
  return e("div", { style: { display: "flex", flexDirection: "column", gap: 20 } },
    weekPlan.map((w, i) =>
      e("div", { key: i, style: { background: "#18181b", border: "1px solid #27272a", borderLeft: "3px solid " + w.color, borderRadius: 12, padding: "20px 24px" } },
        e("div", { style: { display: "flex", alignItems: "center", gap: 12, marginBottom: 16 } },
          e("div", { style: { background: w.color + "22", border: "1px solid " + w.color + "44", color: w.color, fontSize: 11, fontWeight: 700, padding: "4px 12px", borderRadius: 6, textTransform: "uppercase", letterSpacing: "0.08em" } }, w.week),
          e("div", { style: { fontSize: 15, fontWeight: 600, color: "#fafafa" } }, w.focus)
        ),
        e("div", { style: { display: "grid", gridTemplateColumns: "1fr 280px", gap: 20 } },
          e("div", null,
            e("div", { style: { fontSize: 11, color: "#71717a", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 } }, "Tasks"),
            w.tasks.map((t, j) =>
              e("div", { key: j, style: { display: "flex", gap: 10, marginBottom: 8, alignItems: "flex-start" } },
                e("div", { style: { minWidth: 20, height: 20, borderRadius: "50%", background: w.color + "22", border: "1px solid " + w.color + "44", color: w.color, fontSize: 10, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", marginTop: 1, flexShrink: 0 } }, j + 1),
                e("div", { style: { fontSize: 13, color: "#d4d4d8", lineHeight: 1.6 } }, t)
              )
            )
          ),
          e("div", { style: { background: "#09090b", border: "1px solid #27272a", borderRadius: 8, padding: "14px 16px", alignSelf: "flex-start" } },
            e("div", { style: { fontSize: 11, color: "#71717a", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 } }, "Expected Result"),
            e("div", { style: { fontSize: 12, color: "#a1a1aa", lineHeight: 1.7 } }, w.expected)
          )
        )
      )
    )
  );
}

function Insights() {
  return e("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 } },
    insights.map((card, i) =>
      e("div", { key: i, style: { background: card.bg, border: "1px solid " + card.border, borderRadius: 12, padding: "20px 22px" } },
        e("h4", { style: { fontSize: 14, fontWeight: 600, color: card.color, marginBottom: 10 } }, card.title),
        e("p", { style: { fontSize: 13, color: "#a1a1aa", lineHeight: 1.7, margin: 0 } }, card.body)
      )
    )
  );
}

function RailStrategy() {
  const [activeTab, setActiveTab] = useState("map");
  const [expanded, setExpanded] = useState(null);
  const tabs = [{ id: "map", label: "Session → Rail Map" }, { id: "fourweek", label: "4-Week Plan" }, { id: "gaps", label: "Key Insights" }];

  return e("div", { style: { fontFamily: "'DM Sans','Segoe UI',sans-serif", background: "#09090b", minHeight: "100vh", color: "#e4e4e7" } },
    e("div", { style: { background: "linear-gradient(135deg,#18181b 0%,#1c1917 100%)", borderBottom: "1px solid #27272a", padding: "28px 32px 0" } },
      e("div", { style: { maxWidth: 1100, margin: "0 auto" } },
        e("p", { style: { color: "#71717a", fontSize: 12, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 6 } }, "Homepage Optimization · Courses + 1-on-1 Data"),
        e("h1", { style: { fontSize: 26, fontWeight: 700, color: "#fafafa", marginBottom: 4 } }, "Rail ↔ Session Strategy"),
        e("p", { style: { color: "#a1a1aa", fontSize: 14, marginBottom: 24 } }, "Top courses + 1-on-1s mapped to the right rails — with a 4-week rollout plan"),
        e("div", { style: { display: "flex", gap: 4 } },
          tabs.map(t =>
            e("button", { key: t.id, onClick: () => setActiveTab(t.id), style: { padding: "10px 18px", background: activeTab === t.id ? "#fafafa" : "transparent", color: activeTab === t.id ? "#09090b" : "#71717a", border: "none", borderRadius: "8px 8px 0 0", cursor: "pointer", fontSize: 13, fontWeight: activeTab === t.id ? 600 : 400 } }, t.label)
          )
        )
      )
    ),
    e("div", { style: { maxWidth: 1100, margin: "0 auto", padding: "28px 32px" } },
      activeTab === "map" ? e(RailMap, { expanded, setExpanded }) : null,
      activeTab === "fourweek" ? e(WeekPlan, null) : null,
      activeTab === "gaps" ? e(Insights, null) : null
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(e(RailStrategy, null));
  </script>
</body>
</html>
